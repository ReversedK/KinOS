# KinOS toolchain runs in containers, never against the host node/npm.
#
# Usage:
#   docker compose run --rm dev npm install
#   docker compose run --rm dev npm test
#   docker compose run --rm dev npm run typecheck
#   docker compose up api                     # run the local API (+ Sphere MCP)
#
# The repo is bind-mounted; node_modules lives in a named volume so installs
# stay inside the container and never pollute (or depend on) the host.
services:
  dev:
    build: .
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
      # Use the user's existing/running Ollama on the host, not a containerised
      # one. The Ollama runtime adapter reads OLLAMA_BASE_URL.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      # Make host.docker.internal resolve on plain Linux Docker too (not only
      # Docker Desktop), so the container can reach the host's Ollama.
      - "host.docker.internal:host-gateway"

  # The KinOS API server (read API + governed write path + the Sphere MCP
  # gateway at POST /spheres/:id/mcp, RFC-007/ADR-007). The UI consumes it.
  api:
    build: .
    working_dir: /app
    command: sh -c "npm install >/dev/null 2>&1 && npm run -w @kinos/api serve"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - kinos_data:/app/data
    ports:
      - "8787:8787"
    environment:
      - KINOS_API_PORT=8787
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Boring runtime swap (coding principle 9). Default local-first Ollama;
      # set to "hermes" once the hermes service below is enabled. Hermes-as-
      # inference reuses the OpenAI adapter against Hermes' OpenAI-compatible API
      # server (/v1, default :8642), Bearer-authenticated by API_SERVER_KEY.
      - KINOS_RUNTIME=${KINOS_RUNTIME:-ollama}
      - HERMES_BASE_URL=http://hermes:8642/v1
      - HERMES_API_KEY=${HERMES_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ADR-007 hardening note: the Sphere MCP is currently path-mounted on this
    # published API port and is token-authenticated (the token, not the
    # transport, is the boundary). For production it should move to a private-only
    # listener (Unix socket co-located, else a non-published port on the internal
    # network) so it is never reachable from the host. The token model is
    # unchanged either way.

  # The KinOS operator console (RFC-003/008). A Next.js app that server-renders
  # already-governed state and triggers governed writes through a same-origin
  # proxy to the API (no CORS; the API stays the authorization boundary). Reaches
  # the API over the compose network at http://api:8787.
  ui:
    build: .
    working_dir: /app
    command: sh -c "npm install >/dev/null 2>&1 && npm run build -w @kinos/ui && npm run start -w @kinos/ui"
    depends_on:
      - api
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      # Override the host port if 3000 is taken: KINOS_UI_PORT=3005 docker compose up ui
      - "${KINOS_UI_PORT:-3000}:3000"
    environment:
      - KINOS_API_URL=http://api:8787
      - PORT=3000

  # --- Hermes runtime (RFC-007) — TEMPLATE, intentionally not started ----------
  # RFC-007 runs Hermes in its own container: one install, many agents via
  # profiles, behind a single multiplexing gateway. KinOS governs at the
  # profile/MCP layer, never the process layer.
  #
  # Template (build the image first, then uncomment). The RFC-007/ADR-007
  # integration has been verified against this real image: a Hermes MCP client
  # completes the MCP handshake against the KinOS Sphere MCP, authenticates with
  # the per-agent token (resolved from ${SPHERE_MCP_TOKEN}), discovers only the
  # policy-authorized tool surface, and a forged token fails closed.
  #
  # Build the real image (NousResearch/hermes-agent), then enable Hermes:
  #   git clone https://github.com/NousResearch/hermes-agent && \
  #     cd hermes-agent && docker build -t hermes-agent:local .
  #
  # Hermes reaches KinOS over the MCP, configured in its profile config.yaml
  # (~/.hermes/config.yaml) — the schema KinOS projects (see
  # packages/adapters/runtime-hermes/src/hermes-config.ts):
  #   mcp_servers:
  #     sphere:
  #       url: http://localhost:8787/spheres/<sphereId>/mcp   # host-net: localhost
  #       headers: { Authorization: "Bearer ${SPHERE_MCP_TOKEN}" }
  #       tools: { include: [<authorized capabilities>] }
  # The token VALUE goes in the profile .env (SPHERE_MCP_TOKEN=...), never in
  # config.yaml (ADR-007). Hermes interpolates ${VAR} from the environment.
  #
  # Note: the `hermes mcp test` CLI needs the mcp[cli]/typer extra (not baked into
  # the published image); the agent runtime's MCP client itself works without it.
  #
  # hermes:
  #   image: hermes-agent:local
  #   network_mode: host                  # so it can reach KinOS api on :8787
  #   environment:
  #     - HERMES_UID=${HERMES_UID:-10000}
  #     - HERMES_GID=${HERMES_GID:-10000}
  #     - SPHERE_MCP_TOKEN=${SPHERE_MCP_TOKEN}   # the agent's provisioned token
  #   volumes:
  #     - hermes_home:/opt/data           # per-profile config/sessions/state
  #   command: ["gateway", "run"]

volumes:
  node_modules:
  kinos_data:
  # hermes_home:
