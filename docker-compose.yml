# KinOS toolchain runs in containers, never against the host node/npm.
#
# Usage:
#   docker compose run --rm dev npm install
#   docker compose run --rm dev npm test
#   docker compose run --rm dev npm run typecheck
#   docker compose up api                     # run the local API (+ Sphere MCP)
#
# The repo is bind-mounted; node_modules lives in a named volume so installs
# stay inside the container and never pollute (or depend on) the host.
services:
  dev:
    build: .
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CI=true
      # Use the user's existing/running Ollama on the host, not a containerised
      # one. The Ollama runtime adapter reads OLLAMA_BASE_URL.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      # Make host.docker.internal resolve on plain Linux Docker too (not only
      # Docker Desktop), so the container can reach the host's Ollama.
      - "host.docker.internal:host-gateway"

  # The KinOS API server (read API + governed write path + the Sphere MCP
  # gateway at POST /spheres/:id/mcp, RFC-007/ADR-007). The UI consumes it.
  api:
    build: .
    working_dir: /app
    command: sh -c "npm install >/dev/null 2>&1 && npm run -w @kinos/api serve"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - kinos_data:/app/data
      - hermes_home:/app/data/hermes
    ports:
      - "8787:8787"
    environment:
      - KINOS_API_PORT=8787
      # Hermes is the sole Harness (ADR-008 §3) — there is no harness selection.
      # KinOS reaches it through its OpenAI-compatible API server (/v1, default
      # :8642), Bearer-authenticated by API_SERVER_KEY. Which provider/model the
      # agent runs on is NOT set here: that is the governed RFC-004/009 decision,
      # projected into the agent's Hermes profile by runtime.config.project.
      - HERMES_BASE_URL=http://hermes:8642/v1
      # The Sphere-MCP endpoint written into each agent's projected profile. It
      # must be reachable from the HERMES container, where "localhost" is Hermes
      # itself — so this is the compose service name, not the API's own address.
      - KINOS_PUBLIC_URL=http://api:8787
      # Shared with the hermes service's API_SERVER_KEY; must be >=16 chars (the
      # Hermes API server refuses to start otherwise on a 0.0.0.0 bind).
      - HERMES_API_KEY=${HERMES_API_KEY:-kinos-harness-devkey-0001}
      # Shared Hermes home: the API reconciles per-agent named profiles here and
      # the Hermes container reads the same volume at /opt/data.
      - HERMES_HOME=/app/data/hermes
      # Real Google integrations (Calendar, Drive) need the KinOS app's OAuth
      # CLIENT — an "OAuth 2.0 Client ID" from Google Cloud Console (client_id +
      # secret), NOT a service-account key. Set these (+ BETTER_AUTH_SECRET) to
      # switch from the FakeAuthBroker to real per-user consent (RFC-017/032). One
      # client covers all Google providers; users never type a secret — they click
      # Connect. Unset → the deterministic FakeAuthBroker (dev).
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      # The API as the BROWSER reaches it — NOT the compose name http://api:8787
      # (that is KINOS_PUBLIC_URL, for Hermes→Sphere-MCP container-to-container).
      # Better Auth derives the Google redirect_uri from this, and Google redirects
      # the browser there, so it must be browser-reachable. The redirect URI to
      # whitelist in Google Cloud Console is `${BETTER_AUTH_URL}/api/auth/callback/google`.
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:8787}
      # Where Better Auth returns the browser after consent (KinOS sets the account
      # reference here). Internal to KinOS — NOT a Google redirect URI.
      - KINOS_OAUTH_REDIRECT_URI=${KINOS_OAUTH_REDIRECT_URI:-http://localhost:8787/oauth/connected}
      # The console as the browser reaches it — /oauth/connected 302-redirects back
      # here after a connect (RFC-036), so the user lands in the UI, not on JSON.
      - KINOS_CONSOLE_URL=${KINOS_CONSOLE_URL:-http://localhost:3100}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ADR-007 hardening note: the Sphere MCP is currently path-mounted on this
    # published API port and is token-authenticated (the token, not the
    # transport, is the boundary). For production it should move to a private-only
    # listener (Unix socket co-located, else a non-published port on the internal
    # network) so it is never reachable from the host. The token model is
    # unchanged either way.

  # The KinOS operator console (RFC-003/008). A Next.js app that server-renders
  # already-governed state and triggers governed writes through a same-origin
  # proxy to the API (no CORS; the API stays the authorization boundary). Reaches
  # the API over the compose network at http://api:8787.
  ui:
    build: .
    working_dir: /app
    # `next dev` compiles on demand and recovers gracefully across restarts. It
    # avoids the production-build pitfall of this bind-mounted setup: `next build`
    # rewrites .next on every `up` (new BUILD_ID → open tabs 404 on old chunks),
    # and ad-hoc host builds writing the same .next corrupt it. `.next` lives in
    # an isolated named volume (below) so nothing outside this service touches it.
    command: sh -c "npm install >/dev/null 2>&1 && npm run dev -w @kinos/ui"
    depends_on:
      - api
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ui_next:/app/ui/.next
    ports:
      # Console on host :3100 (3000/3005 are commonly taken by other dev servers).
      # Override with KINOS_UI_PORT=<port> docker compose up ui if 3100 is taken too.
      - "${KINOS_UI_PORT:-3100}:3000"
    environment:
      - KINOS_API_URL=http://api:8787
      - PORT=3000

  # --- Hermes Harness (ADR-008 / RFC-007) — the sole Harness ------------------
  # The governed execution environment agents run inside (ADR-008 §2: an agent
  # never executes bare). Hermes runs its OpenAI-compatible API server
  # (`gateway run` → api_server platform on :8642), which the api service calls.
  # There is no alternative harness and no harness switch: ADR-008 §3 makes Hermes
  # an adapter behind the Harness role, not a deployment choice.
  #
  # SCOPE (verified): the api_server serves ONE active profile and the request
  # `model` field is cosmetic (no per-request model→profile routing). The shared
  # profile volume is wired below, so KinOS reconciles Hermes-native per-agent
  # profiles in-place under /opt/data/profiles/<agent>. Remaining gap: the
  # api_server lacks per-request profile selection, so the per-agent governed
  # profile is exercised through the TUI (docker exec → `hermes --profile <agent>`),
  # not through /v1 chat.
  #
  # Requires the real image (NousResearch/hermes-agent, ~3.8GB), built once:
  #   git clone https://github.com/NousResearch/hermes-agent && \
  #     cd hermes-agent && docker build -t hermes-agent:local .
  #
  # Start the stack:
  #   docker compose up api hermes ui
  # The provider/model each agent runs on is NOT configured here — it is the
  # governed RFC-004/009 decision, projected into that agent's Hermes profile by
  # runtime.config.project. HARNESS_* below only seeds the container's own default
  # profile for first boot, before any projection has been written.
  #
  # Per-agent projected profiles + the Sphere-MCP tool callback (RFC-007/ADR-007:
  # config.yaml `mcp_servers.sphere` → http://api:8787/spheres/<id>/mcp, token in
  # the profile .env, never in config.yaml) are layered on by KinOS'
  # runtime.config.project, and were verified against this image (MCP handshake,
  # policy-scoped tool discovery, forged-token fail-closed).
  hermes:
    image: hermes-agent:local
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # OpenAI-compatible API server auth; shared with the api service's
      # HERMES_API_KEY. Must be >=16 chars (Hermes refuses shorter on 0.0.0.0).
      - API_SERVER_KEY=${HERMES_API_KEY:-kinos-harness-devkey-0001}
      # Hermes' own inference backend (its profile model). Overridable.
      - HARNESS_MODEL=${HARNESS_MODEL:-gemma4-128k}
      - HARNESS_OLLAMA_URL=${HARNESS_OLLAMA_URL:-http://host.docker.internal:11434/v1}
      - HARNESS_MODEL_CONTEXT=${HARNESS_MODEL_CONTEXT:-65536}
      # Where the TUI bridge redeems attach tickets (ADR-008 §6). It decides
      # nothing: KinOS answers with an agent id and the bridge opens that
      # profile. No docker socket is mounted anywhere — the bridge runs here,
      # beside the terminal, so the API keeps no host privilege.
      - KINOS_API_URL=http://api:8787
      - TUI_BRIDGE_PORT=8788
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Harness terminal websocket, consumed by the console's TUI page.
      - "${KINOS_TUI_PORT:-8788}:8788"
    volumes:
      - hermes_home:/opt/data                       # per-profile config/sessions/state
      - ./deploy/hermes/bootstrap.py:/opt/harness-bootstrap.py:ro
      - ./deploy/hermes/tui-bridge.py:/opt/tui-bridge.py:ro
    # cont-init creates/migrates config.yaml first; then bootstrap makes it a
    # KinOS Harness config, the TUI bridge comes up beside the gateway, and we
    # hand off to the gateway (api_server platform).
    command:
      - "sh"
      - "-c"
      - "python3 /opt/harness-bootstrap.py && (python3 /opt/tui-bridge.py &) && exec hermes gateway run"

volumes:
  node_modules:
  kinos_data:
  ui_next:
  hermes_home:
